<!DOCTYPE html>
<html>

<head>
    <script>
        const userLang = navigator.language || navigator.userLanguage;

        if (userLang.startsWith('nl')) {
            window.location.href = "/nl/index.html";
        } else {
            window.location.href = "/en/index.html";
        }
    </script>
</head>

<body>
    <h4>
        You will be redirected shortly. / U wordt binnenkort doorverwezen.
    </h4>
    <p>
        If nothing happens for 5 seconds: click <a href="/en/index.html">here to be redirected</a>.
        <br>
        Als er niets gebeurd voor 5 seconcen: klik dan <a href="/nl/index.html">om doorverwezen te worden</a>.
    </p>
</body>

</html>
