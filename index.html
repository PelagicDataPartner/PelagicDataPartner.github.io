<!DOCTYPE html>
<html>

<head>
    <script>
        const userLang = navigator.language || navigator.userLanguage;

        if (userLang.startsWith('nl')) {
            window.location.href = "/nl/index.html";
        } else {
            window.location.href = "/en/index.html";
        }
    </script>
</head>

<body>
    <p>
        You will be redirected shortly.
    </p>
</body>

</html>
